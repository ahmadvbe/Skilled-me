mutation CreateSkill(
  $authorClerkId: String!
  $title: String!
  $description: String!
  $tags: [String!]!
  $installCommand: String!
  $promptConfig: String!
  $usageExample: String!
) @auth(level: USER) {
  skill_insert(data: {
    author: { clerkId: $authorClerkId }
    title: $title
    description: $description
    tags: $tags
    installCommand: $installCommand
    promptConfig: $promptConfig
    usageExample: $usageExample
  })
}

mutation UpdateSkill(
  $id: UUID!
  $title: String
  $description: String
  $tags: [String!]
  $installCommand: String
  $promptConfig: String
  $usageExample: String
) @auth(level: USER) {
  skill_update(id: $id, data: {
    title: $title
    description: $description
    tags: $tags
    installCommand: $installCommand
    promptConfig: $promptConfig
    usageExample: $usageExample
  })
}

mutation DeleteSkill($id: UUID!) @auth(level: USER) {
  skill_delete(id: $id)
}

mutation UpsertUser(
  $clerkId: String!
  $email: String!
  $username: String
  $imageUrl: String
) @auth(level: USER) {
  user_upsert(data: {
    clerkId: $clerkId
    email: $email
    username: $username
    imageUrl: $imageUrl
  })
}